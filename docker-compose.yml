version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: guardianmcp-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: guardianmcp
      POSTGRES_USER: guardianmcp
      POSTGRES_PASSWORD: guardianmcp_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guardianmcp"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: guardianmcp-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
