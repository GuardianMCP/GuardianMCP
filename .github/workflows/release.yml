name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-cli:
    name: Build CLI Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build
        working-directory: cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          go build -ldflags "-X github.com/guardianmcp/guardianmcp/cmd.Version=${{ github.ref_name }}" \
            -o ../guardianmcp-${{ matrix.goos }}-${{ matrix.goarch }}${EXT} .
      - uses: actions/upload-artifact@v4
        with:
          name: guardianmcp-${{ matrix.goos }}-${{ matrix.goarch }}
          path: guardianmcp-*

  release:
    name: Create GitHub Release
    needs: build-cli
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: guardianmcp-*
          generate_release_notes: true

  publish-npm:
    name: Publish to NPM
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Sync version from git tag
        working-directory: guardianmcp-npm
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Publishing version: $VERSION"
          # Update package.json version
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          # Update VERSION constant in binary downloader
          sed -i "s/const VERSION = \".*\"/const VERSION = \"$VERSION\"/" bin/guardianmcp.js

      - name: Verify package
        working-directory: guardianmcp-npm
        run: |
          echo "=== package.json ==="
          cat package.json | head -5
          echo "=== Binary downloader version ==="
          grep "const VERSION" bin/guardianmcp.js

      - name: Publish to NPM
        working-directory: guardianmcp-npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
